<div id="game-container" style="width: 100%; max-width: 600px; margin: auto; font-family: sans-serif; text-align: center; border: 2px solid #ccc; padding: 20px; border-radius: 15px; background: #fdfdfd;">
    <h2 style="color: #333;">Sort it! 🏠 vs 🏫</h2>
    <p style="font-size: 14px; color: #555;">Drag items into the correct bin!</p>
    
    <div id="items" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; min-height: 100px;">
        <!-- Items generated by script -->
    </div>

    <div style="display: flex; justify-content: center; gap: 20px;">
        <div class="bin" ondrop="drop(event)" ondragover="allowDrop(event)" style="width: 120px; height: 150px; border: 3px dashed #4a90e2; background: #eef6ff; display: flex; align-items: center; justify-content: center; flex-direction: column;">
            <span style="font-size: 30px;">🏠</span>
            <p>Home</p>
        </div>
        <div class="bin" ondrop="drop(event)" ondragover="allowDrop(event)" style="width: 120px; height: 150px; border: 3px dashed #e67e22; background: #fff5eb; display: flex; align-items: center; justify-content: center; flex-direction: column;">
            <span style="font-size: 30px;">🏫</span>
            <p>School</p>
        </div>
    </div>

    <script>
        const data = [
            {n: "Toothbrush", c: "Home"}, {n: "Pillow", c: "Home"}, {n: "Frying Pan", c: "Home"}, {n: "Remote", c: "Home"}, {n: "Towel", c: "Home"},
            {n: "Bed Sheets", c: "Home"}, {n: "Shampoo", c: "Home"}, {n: "Chair", c: "Home"}, {n: "Broom", c: "Home"}, {n: "Fridge", c: "Home"},
            {n: "Marker", c: "School"}, {n: "Globe", c: "School"}, {n: "Textbook", c: "School"}, {n: "Calculator", c: "School"}, {n: "Protractor", c: "School"},
            {n: "Dictionary", c: "School"}, {n: "Attendance", c: "School"}, {n: "Bell", c: "School"}, {n: "Pencil Case", c: "School"}, {n: "Paper", c: "School"}
        ];

        const container = document.getElementById('items');
        data.sort(() => Math.random() - 0.5).forEach((item, i) => {
            let el = document.createElement('div');
            el.className = 'item';
            el.draggable = true;
            el.innerText = item.n;
            el.id = 'i' + i;
            el.dataset.cat = item.c;
            el.style = "padding: 8px; background: #fff; border: 1px solid #333; cursor: grab; border-radius: 5px; box-shadow: 2px 2px 2px #ccc;";
            el.ondragstart = (e) => e.dataTransfer.setData("text", e.target.id);
            container.appendChild(el);
        });

        function allowDrop(e) { e.preventDefault(); }
        function drop(e) {
            e.preventDefault();
            let id = e.dataTransfer.getData("text");
            let el = document.getElementById(id);
            let bin = e.target.closest('.bin');
            if (bin.innerText.includes(el.dataset.cat)) {
                bin.appendChild(el);
                el.style.display = "none"; // Hide after sorting
            } else {
                alert("Oops! Not quite right. Try the other one!");
            }
        }
    </script>
</div>
